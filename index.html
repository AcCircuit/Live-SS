    <style>
        :root {
            --primary-neon: #ff0055; 
            --bg-dark: #08090c;
            --card-dark: #12141c;
            --border-dark: #1f2330;
            --text-gray: #949aab;
        }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fixed Top Cinematic Player */
        .player-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--border-dark);
        }
        video {
            width: 100%;
            max-height: 225px;
            display: block;
            aspect-ratio: 16/9;
            background: #000;
        }

        /* Shohag TV Header */
        .app-navbar {
            background: #0e1017;
            padding: 15px;
            border-bottom: 1px solid var(--border-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-logo span {
            color: var(--primary-neon);
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }
        .status-badge {
            background: rgba(255, 0, 85, 0.1);
            color: var(--primary-neon);
            border: 1px solid var(--primary-neon);
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            animation: pulse 1.8s infinite;
        }

        /* Horizontal Scrolling categories */
        .nav-categories {
            background: #0e1017;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-dark);
        }
        .scroll-wrapper {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 15px;
            gap: 10px;
        }
        .scroll-wrapper::-webkit-scrollbar {
            display: none; 
        }
        .cat-item-btn {
            background: #171a24;
            color: #a2a8b9;
            border: 1px solid var(--border-dark);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .cat-item-btn.active {
            background: var(--primary-neon);
            color: white;
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        /* Channels Grid List */
        .channels-grid {
            padding: 15px;
        }
        .channel-row-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .channel-row-card:active {
            transform: scale(0.97);
            background: #191c27;
        }
        .logo-box {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #1d212f, #0c0e14);
            border: 1px solid #2a2f42;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .meta-box {
            flex-grow: 1;
        }
        .meta-box h5 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #f6f7f9;
        }
        .meta-box p {
            margin: 4px 0 0 0;
            font-size: 0.75rem;
            color: var(--text-gray);
        }
        .action-play-btn {
            color: var(--text-gray);
            font-size: 1.1rem;
        }
        .channel-row-card:hover .action-play-btn {
            color: var(--primary-neon);
        }

        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.4); }
            70% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255, 0, 85, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }

        const video = document.getElementById('video');

        let currentHlsEngine = null;

        // চ্যানেল রেন্ডারার ফাংশন
        function displayChannels(filter) {
            if (!container) return;
            container.innerHTML = "";
            
            channels.forEach((channel) => {
                if (filter === 'All' || channel.category === filter) {
                    const card = document.createElement('div');
                    card.className = 'channel-row-card';
                    card.setAttribute('onclick', `playStream("${channel.url}")`);

                    card.innerHTML = `
                        <div class="logo-box">
                            <img src="${channel.logo}" alt="logo" onerror="this.src='https://via.placeholder.com/100/171a24/ffffff?text=TV'">
                        </div>
                        <div class="meta-box">
                            <h5>${channel.name}</h5>
                            <p>${channel.category} Premium Server</p>
                        </div>
                        <div class="action-play-btn">
                            <i class="fa-solid fa-circle-play"></i>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // ক্যাটাগরি ফিল্টার লজিক
        function filterCategory(categoryName) {
            const buttons = document.querySelectorAll('.cat-item-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (window.event && window.event.target) {
                window.event.target.classList.add('active');
            } else if (event && event.target) {
                event.target.classList.add('active');
            }
            displayChannels(categoryName);
        }

        // আল্ট্রা ফাস্ট নো-বাফারিং HLS ইঞ্জিন
        function playStream(url) {
            if (currentHlsEngine) {
                currentHlsEngine.destroy();
            }

            if (Hls.isSupported()) {
                currentHlsEngine = new Hls({
                    maxBufferLength: 8,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                currentHlsEngine.loadSource(url);
                currentHlsEngine.attachMedia(video);
                currentHlsEngine.on(Hls.Events.MANIFEST_PARSED, function() { 
                    video.play().catch(e => console.log("Autoplay Triggered")); 
                });
                
                currentHlsEngine.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        currentHlsEngine.startLoad();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        window.onload = function() {
            displayChannels('All');
            if(channels.length > 0) {
                playStream(channels[0].url);
            }
        };
