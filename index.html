<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robiul IPTV Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #12141c;
            color: white;
            font-family: Arial, sans-serif;
        }
        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px;
            background: #1a1d29;
            border-bottom: 1px solid #2a2e3f;
        }
        video {
            width: 100%;
            max-height: 250px;
            background: black;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .category-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 15px;
            gap: 10px;
        }
        .category-btn {
            background: #222634;
            color: #b5b9c4;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .category-btn.active {
            background: #e50914;
            color: white;
        }
        .channel-list {
            padding: 15px;
        }
        .channel-card {
            background: #1c1f2e;
            border: 1px solid #2a2e3f;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .channel-card:active {
            background: #2a2e3f;
        }
        .channel-logo {
            width: 50px;
            height: 50px;
            background: #2a2e3f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 15px;
            overflow: hidden;
        }
        .channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-info h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        .channel-info p {
            margin: 0;
            font-size: 0.8rem;
            color: #8a8f9e;
        }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>

    <div class="header-title">লাইভ টিভি অ্যাপ</div>

    <div class="category-scroll">
        <button class="category-btn active" onclick="filterCategory('All')">সব ক্যাটাগরি</button>
        <button class="category-btn" onclick="filterCategory('Bangla')">Bangla</button>
        <button class="category-btn" onclick="filterCategory('Sports')">Sports</button>
        <button class="category-btn" onclick="filterCategory('Indian')">Indian</button>
    </div>

    <div class="channel-list" id="channelContainer">
        </div>

    <script src="app.js"></script>
</body>
</html>
